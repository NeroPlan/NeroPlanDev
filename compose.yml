name: neroplan

services:
  proxy:
    build:
      context: ./proxy # 어디 경로의 도커파일 실행할지 알려주는 부분 -> 현재 경로의 도커파일!
    image : nginx
    container_name: proxy
    ports:
      - "8080:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
    restart: always

  frontend:
    build:
      context:  ./frontend # 어디 경로의 도커파일 실행할지 알려주는 부분 -> 현재 경로의 도커파일!
    image : frontend
    container_name: frontend
    ports:
      - "3000:80"
    restart: always

  backend:
    build:
      context:  ./backend # 어디 경로의 도커파일 실행할지 알려주는 부분 -> 현재 경로의 도커파일!
    image : backend
    container_name: backend
    ports:
      - "4000:80"
    restart: always
    